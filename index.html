<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINE LIVRE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B0B0B;color:#fff;font-family:Arial}
header{position:fixed;top:0;width:100%;padding:12px 4%;background:#000;display:flex;align-items:center;gap:15px;z-index:100}
header h1{color:#E50914;font-size:20px}
nav button{background:none;border:none;color:#fff;font-size:13px;cursor:pointer}
.banner{display:none} /* TIREI O BANNER HD */
.row{padding:15px 4%;margin-top:50px}
.row h3{margin-bottom:8px;font-size:16px}
.lista-row{display:flex;gap:6px;overflow-x:auto}
.lista-row::-webkit-scrollbar{display:none}
.card{min-width:110px;cursor:pointer} /* Pôster menor */
.card img{width:100%;border-radius:3px}
#player{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:200;display:none;flex-direction:column}
#player button{margin:10px;background:#333;color:#fff;border:none;padding:8px 15px;width:100px}
#player iframe{flex:1;border:none}
</style>
</head>
<body>
<header><h1>CINE LIVRE</h1><nav><button onclick="carregar('popular')">Início</button><button onclick="carregar('top_rated')">Top</button></nav></header>
<div class="row"><h3>Em Alta</h3><div class="lista-row" id="listaPopular"></div></div>
<div class="row"><h3>Top Avaliados</h3><div class="lista-row" id="listaTop_rated"></div></div>
<div id="player"><button onclick="voltar()">⬅ Voltar</button><iframe id="iframePlayer" allowfullscreen loading="lazy"></iframe></div>
<script>
const API_KEY="251ab326b041f1ccd4bfa4c407cd2940";
const IMG="https://image.tmdb.org/t/p/w200"; /* w200 = imagem pequena */
let filmesCarregados = 0;

async function carregar(tipo){
if(filmesCarregados > 0) return; /* só carrega 1 vez */
const res=await fetch(`https://api.themoviedb.org/3/movie/${tipo}?api_key=${API_KEY}&language=pt-BR&page=1`);
const data=await res.json();
mostrarLinha(data.results.slice(0,15), tipo); /* só 15 filmes por linha */
filmesCarregados++;
}

function mostrarLinha(filmes, id){
let html="";
filmes.forEach(f=>{
if(!f.poster_path)return;
html+=`<div class="card" onclick="assistir(${f.id})"><img src="${IMG}${f.poster_path}" loading="lazy"></div>` /* lazy load */
});
document.getElementById('lista'+id.charAt(0).toUpperCase()+id.slice(1)).innerHTML=html;
}

function assistir(id){
document.getElementById('player').style.display="flex";
document.getElementById('iframePlayer').src=`https://vidapi.xyz/embed/movie/${id}/pt`;
document.body.style.overflow="hidden";
}

function voltar(){
document.getElementById('player').style.display="none";
document.getElementById('iframePlayer').src="";
document.body.style.overflow="auto";
}

carregar('popular');
carregar('top_rated');
</script>
</body>
</html>
