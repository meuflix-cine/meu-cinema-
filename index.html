<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINE LIVRE</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#141414; color:#fff; font-family:Arial, sans-serif; }
    header { display:flex; justify-content:space-between; align-items:center; padding:15px 40px; background:#000; position:fixed; width:100%; z-index:100; }
    .logo { color:#e50914; font-size:28px; font-weight:bold; }
    #busca { padding:10px; width:250px; background:#333; border:none; border-radius:6px; color:#fff; }

    .banner { height:90vh; background-size:cover; background-position:center; display:flex; align-items:flex-end; padding:0 50px 80px; }
    .banner-info h1 { font-size:50px; margin-bottom:10px; }
    .banner-info p { max-width:500px; font-size:18px; }

    .categoria { padding:30px 40px; margin-top:50px; }
    .categoria h2 { margin-bottom:15px; font-size:24px; }
    .lista-filmes { display:flex; gap:12px; overflow-x:auto; padding-bottom:20px; }
    .card-filme { min-width:180px; cursor:pointer; transition:0.3s; }
    .card-filme:hover { transform:scale(1.08); }
    .card-filme img { width:100%; border-radius:8px; }
    .card-filme p { text-align:center; margin-top:8px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">CINE LIVRE</div>
    <input type="text" id="busca" placeholder="🔎 Buscar filme ou série...">
  </header>

  <section class="banner" id="banner">
    <div class="banner-info" id="banner-info"></div>
  </section>

  <main>
    <section class="categoria">
      <h2>Lançamentos</h2>
      <div class="lista-filmes" id="lancamentos"></div>
    </section>

    <section class="categoria">
      <h2>Populares</h2>
      <div class="lista-filmes" id="populares"></div>
    </section>

    <section class="categoria">
      <h2>Mais Votados</h2>
      <div class="lista-filmes" id="top"></div>
    </section>
  </main>

  <script>
    const API_KEY = "251ab326b041f1ccd4bfa4c407cd2940";
    const BASE_URL = "https://api.themoviedb.org/3";
    const IMG_URL = "https://image.tmdb.org/t/p/w500";

    async function pegarFilmes(url) {
      const res = await fetch(url);
      const data = await res.json();
      return data.results;
    }

    async function carregarBanner() {
      const filmes = await pegarFilmes(`\( {BASE_URL}/movie/popular?api_key= \){API_KEY}&language=pt-BR`);
      const filme = filmes[0];
      document.getElementById('banner').style.backgroundImage = `url(\( {IMG_URL} \){filme.backdrop_path})`;
      document.getElementById('banner-info').innerHTML = `
        <h1>${filme.title}</h1>
        <p>${filme.overview.substring(0, 180)}...</p>
      `;
    }

    function mostrarFilmes(filmes, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = filmes.map(f => `
        <div class="card-filme">
          <img src="\( {IMG_URL} \){f.poster_path}" alt="${f.title}">
          <p>${f.title}</p>
        </div>
      `).join('');
    }

    async function carregarTudo() {
      const lanc = await pegarFilmes(`\( {BASE_URL}/movie/now_playing?api_key= \){API_KEY}&language=pt-BR`);
      const pop = await pegarFilmes(`\( {BASE_URL}/movie/popular?api_key= \){API_KEY}&language=pt-BR`);
      const top = await pegarFilmes(`\( {BASE_URL}/movie/top_rated?api_key= \){API_KEY}&language=pt-BR`);

      mostrarFilmes(lanc, 'lancamentos');
      mostrarFilmes(pop, 'populares');
      mostrarFilmes(top, 'top');
    }

    // Iniciar
    carregarBanner();
    carregarTudo();
  </script>
</body>
</html>
