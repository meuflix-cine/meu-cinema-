<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Cinema - Assista Online</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:Arial, sans-serif; background:#141414; color:#fff; }
    header { background:#000; padding:15px 40px; display:flex; align-items:center; justify-content:space-between; position:fixed; width:100%; z-index:100; }
    .logo { font-size:28px; font-weight:bold; color:#e50914; }
    nav a { color:#fff; margin:0 15px; text-decoration:none; }
    nav a:hover { color:#e50914; }
    .banner { height:85vh; background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)), url('https://image.tmdb.org/t/p/original/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg') center/cover; display:flex; align-items:center; padding:0 60px; margin-top:70px; }
    .banner h1 { font-size:52px; margin-bottom:10px; }
    .banner p { font-size:20px; max-width:600px; margin-bottom:25px; }
    .btn { padding:14px 32px; font-size:18px; border:none; border-radius:5px; margin-right:15px; cursor:pointer; }
    .btn-assistir { background:#e50914; color:white; }
    .categoria { padding:40px 60px; }
    .categoria h2 { margin-bottom:20px; font-size:26px; }
    .lista-filmes { display:flex; gap:15px; overflow-x:auto; padding-bottom:20px; }
    .card { min-width:180px; transition:0.3s; cursor:pointer; }
    .card:hover { transform:scale(1.08); }
    .card img { width:100%; border-radius:8px; }
    .card p { text-align:center; margin-top:8px; font-size:15px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">🎥 MEU CINEMA</div>
    <nav>
      <a href="#">Início</a>
      <a href="#">Filmes</a>
      <a href="#">Séries</a>
    </nav>
  </header>

  <section class="banner">
    <div>
      <h1>Velozes & Furiosos X</h1>
      <p>Ação explosiva retorna com Dom e sua família!</p>
      <button class="btn btn-assistir">▶ Assistir Agora</button>
    </div>
  </section>

  <section class="categoria">
    <h2>🔥 Em Alta</h2>
    <div class="lista-filmes">
      <div class="card"><img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg"><p>Velozes X</p></div>
      <div class="card"><img src="https://image.tmdb.org/t/p/w500/qAZ0pzatP0rHYe4oGel0gMKq5yP.jpg"><p>Homem-Aranha</p></div>
      <div class="card"><img src="https://image.tmdb.org/t/p/w500/6CoRTJTmijhBLJTUNoVSUNxZME.jpg"><p>Vingadores</p></div>
    </div>
  </section>
</body>
</html>
