<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINE LIVRE</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0B0B0B; color:#fff; font-family:Arial, sans-serif; }
    header { position:fixed; top:0; width:100%; padding:15px 5%; background:#000; display:flex; align-items:center; gap:15px; z-index:100; }
    header h1 { color:#E50914; font-size:24px; }
    .row { padding:20px 5%; margin-top:70px; }
    .row h3 { margin-bottom:12px; font-size:20px; }
    .lista { display:flex; gap:10px; overflow-x:auto; padding-bottom:15px; }
    .card { min-width:130px; cursor:pointer; }
    .card img { width:100%; border-radius:8px; }
    .card p { text-align:center; margin-top:5px; font-size:14px; }
    #player { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:none; flex-direction:column; z-index:1000; }
    #player button { margin:10px; padding:12px 25px; background:#E50914; color:white; border:none; border-radius:6px; font-size:16px; }
    iframe { flex:1; border:none; }
  </style>
</head>
<body>

  <header>
    <h1>CINE LIVRE</h1>
  </header>

  <div class="row">
    <h3>🔥 Em Alta</h3>
    <div class="lista" id="emAlta"></div>
  </div>

  <div id="player">
    <button onclick="voltar()">⬅ Voltar</button>
    <iframe id="iframePlayer" allowfullscreen></iframe>
  </div>

  <script>
    const API_KEY = "251ab326b041f1ccd4bfa4c407cd2940";
    const IMG = "https://image.tmdb.org/t/p/w200";

    async function carregar() {
      const url = `https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=pt-BR`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        const container = document.getElementById('emAlta');
        container.innerHTML = '';

        data.results.forEach(item => {
          const title = item.title || item.name || "Sem título";
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img src="\( {IMG} \){item.poster_path}" onclick="assistir(\( {item.id}, ' \){item.media_type}')">
            <p>${title}</p>
          `;
          container.appendChild(card);
        });
      } catch(e) {
        console.error(e);
        document.getElementById('emAlta').innerHTML = "<p>Erro ao carregar filmes</p>";
      }
    }

    function assistir(id, tipo) {
      document.getElementById('player').style.display = 'flex';
      const link = tipo === 'tv' 
        ? `https://www.2embed.to/embed/tmdb/tv?id=${id}` 
        : `https://www.2embed.to/embed/tmdb/movie?id=${id}`;
      document.getElementById('iframePlayer').src = link;
    }

    function voltar() {
      document.getElementById('player').style.display = 'none';
      document.getElementById('iframePlayer').src = '';
    }

    // Iniciar
    carregar();
  </script>
</body>
</html>
